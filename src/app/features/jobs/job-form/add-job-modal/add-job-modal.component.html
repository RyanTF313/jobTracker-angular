<dialog id="create-job-modal" #jobFormDialog (close)="handleDialogClose()">
  <form id="create-job-form" #jobForm="ngForm" (ngSubmit)="createJob(jobForm)">
    <h2>Create Job</h2>
    <label for="position">Position:</label>
    <input
      type="text"
      id="position"
      name="position"
      [(ngModel)]="newJob!.position"
      required
    />
    <label for="company">Company:</label>
    <input
      type="text"
      id="company"
      name="company"
      [(ngModel)]="newJob!.company"
      required
    />
    <label for="notes">Notes:</label>
    <textarea id="notes" name="notes" [(ngModel)]="newJob!.notes"></textarea>
    <label for="salary">Salary:</label>
    <input
      type="number"
      id="salary"
      name="salary"
      step="1000"
      [(ngModel)]="newJob!.salary"
    />
    <button
      type="button"
      id="job-cancel-button"
      class="btn cancel"
      (click)="close()"
    >
      Cancel
    </button>
    <button type="submit" id="create-job-button" class="btn">Create Job</button>
  </form>
</dialog>
